# images.lock — PostHog self-hosted (template HASHING3)
#
# Fonte de verdade do digest pinning (ADR-014). Cada imagem upstream consumida
# pelos Dockerfiles é cravada por digest sha256 imutável — nunca por tag mutável.
#
# Formato:  <serviço>  <referência-com-digest>  <origem-da-tag>
#
# Como foi resolvido: digests obtidos da fonte primária (registry OCI API,
# header Docker-Content-Digest) em 2026-06-15. Para re-resolver/atualizar,
# rode tools/resolve-digests.sh (não inventar digest — ver anti-pattern
# premissa-de-fonte-secundaria-nao-verificada no repo mmo).
#
# Âncora PostHog (web/worker/plugins/temporal-django-worker):
#   commit  = 9373a2b55081d3e711ad58bca060a6a9ab5d41a5
#   imagem  = ghcr.io/posthog/posthog@sha256:2472...
#
# ATENÇÃO (skew de versão herdado do upstream): a imagem Django principal
# (posthog/posthog) é publicada por commit SHA, mas os componentes Rust/Go
# (capture, cymbal, feature-flags, livestream, property-defs-rs,
# cyclotron-janitor) só existem na tag rolling ":master" — o upstream NÃO
# publica essas sub-imagens por commit SHA (verificado: capture:<sha> = 404).
# Aqui cada ":master" foi cravado pelo digest do snapshot de 2026-06-15, o que
# torna o build reprodutível, mas NÃO garante que os componentes sejam do mesmo
# commit que o "web". Ao atualizar a âncora, re-resolver TODOS juntos e validar.

