# docker-compose.yml — PostHog self-hosted (HASHING3) para import na Railway
# ─────────────────────────────────────────────────────────────────────────────
# USO: arraste este arquivo no canvas do projeto Railway (drag-and-drop). A
# Railway cria os 19 serviços de uma vez (staged changes). Requer:
#   - os 19 packages GHCR PÚBLICOS (senão a Railway não puxa as imagens)
#   - preencher os <PLACEHOLDERS> (DOMAIN, B2, segredos) após o import
#
# MODELO: usa IMAGENS prontas (image:), NÃO builda Dockerfile. Cada imagem já
# traz seu entrypoint/scripts embutidos — não há shell script externo.
#
# NÃO incluídos (storage 100% Backblaze B2, ADR-015): objectstorage (MinIO),
# seaweedfs. depends_on é só documentação (a Railway ignora; os serviços têm
# restart on-failure e reconectam).
# ─────────────────────────────────────────────────────────────────────────────

x-worker-env: &worker-env
  OTEL_SDK_DISABLED: "true"
  DISABLE_SECURE_SSL_REDIRECT: "true"
  IS_BEHIND_PROXY: "true"
  DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_DATABASE: posthog
  CLICKHOUSE_SECURE: "false"
  CLICKHOUSE_VERIFY: "false"
  CLICKHOUSE_API_USER: api
  CLICKHOUSE_API_PASSWORD: apipass
  CLICKHOUSE_APP_USER: app
  CLICKHOUSE_APP_PASSWORD: apppass
  API_QUERIES_PER_TEAM: '{"1": 100}'
  KAFKA_HOSTS: kafka
  REDIS_URL: redis://redis7:6379/
  PGHOST: db
  PGUSER: posthog
  PGPASSWORD: posthog
  DEPLOYMENT: hobby
  CDP_API_URL: http://plugins:6738
  FLAGS_REDIS_ENABLED: "false"

x-b2-env: &b2-env
  OBJECT_STORAGE_ENABLED: "true"
  OBJECT_STORAGE_ENDPOINT: https://s3.<region>.backblazeb2.com
  OBJECT_STORAGE_REGION: <region>
  OBJECT_STORAGE_ACCESS_KEY_ID: <b2_application_key_id>
  OBJECT_STORAGE_SECRET_ACCESS_KEY: <b2_application_key>
  OBJECT_STORAGE_BUCKET: <bucket>
  OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
  SESSION_RECORDING_V2_S3_ENDPOINT: https://s3.<region>.backblazeb2.com
  SESSION_RECORDING_V2_S3_REGION: <region>
  SESSION_RECORDING_V2_S3_ACCESS_KEY_ID: <b2_application_key_id>
  SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY: <b2_application_key>
  SESSION_RECORDING_V2_S3_BUCKET: <bucket>

services:

  # ── Infra base ──────────────────────────────────────────────────────────
  db:
    image: ghcr.io/hashing3-technologies/posthog-railway/db:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      POSTGRES_USER: posthog
      POSTGRES_DB: posthog
      POSTGRES_PASSWORD: posthog   # <-- troque por segredo forte e propague nas DATABASE_URL
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis7:
    image: ghcr.io/hashing3-technologies/posthog-railway/redis7:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    volumes:
      - redis7-data:/data

  clickhouse:
    image: ghcr.io/hashing3-technologies/posthog-railway/clickhouse:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
      KAFKA_HOSTS: kafka:9092
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    depends_on: [kafka, zookeeper]

  zookeeper:
    image: ghcr.io/hashing3-technologies/posthog-railway/zookeeper:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    volumes:
      - zookeeper-data:/data
      - zookeeper-datalog:/datalog
      - zookeeper-logs:/logs

  # ── Mensageria ──────────────────────────────────────────────────────────
  # [VALIDAR] A imagem é confluentinc/cp-kafka, mas o compose oficial do PostHog
  # usa Redpanda. Esta config é a padrão de cp-kafka single-node + zookeeper
  # (NÃO vem da fonte). Se não subir, a decisão é alinhar a imagem `kafka` para
  # Redpanda (como o kafka-init/rpk já assume).
  kafka:
    image: ghcr.io/hashing3-technologies/posthog-railway/kafka:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: "1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on: [zookeeper]

  # Job one-shot: cria os tópicos e encerra (pode acusar "crash" ao sair — ok).
  kafka-init:
    image: ghcr.io/hashing3-technologies/posthog-railway/kafka-init:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    depends_on: [kafka]

  # ── Orquestração ────────────────────────────────────────────────────────
  temporal:
    image: ghcr.io/hashing3-technologies/posthog-railway/temporal:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      DB: postgresql
      DB_PORT: "5432"
      POSTGRES_USER: posthog
      POSTGRES_PWD: posthog
      POSTGRES_SEEDS: db
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      ENABLE_ES: "false"
    depends_on: [db]

  # ── App Django ──────────────────────────────────────────────────────────
  web:
    image: ghcr.io/hashing3-technologies/posthog-railway/web:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      <<: [*worker-env, *b2-env]
      SITE_URL: https://<DOMAIN>
      LIVESTREAM_HOST: https://<DOMAIN>/livestream
      SECRET_KEY: <POSTHOG_SECRET>
      ENCRYPTION_SALT_KEYS: <ENCRYPTION_SALT_KEYS>
      USE_GRANIAN: "true"
      GRANIAN_WORKERS: "2"
      OPT_OUT_CAPTURE: "false"
    depends_on: [db, redis7, clickhouse, kafka]

  worker:
    image: ghcr.io/hashing3-technologies/posthog-railway/worker:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      <<: [*worker-env, *b2-env]
      SITE_URL: https://<DOMAIN>
      SECRET_KEY: <POSTHOG_SECRET>
      ENCRYPTION_SALT_KEYS: <ENCRYPTION_SALT_KEYS>
      POSTHOG_SKIP_MIGRATION_CHECKS: "1"
    depends_on: [db, redis7, clickhouse, kafka, web]

  plugins:
    image: ghcr.io/hashing3-technologies/posthog-railway/plugins:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      <<: *b2-env
      DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      PERSONS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      BEHAVIORAL_COHORTS_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      CYCLOTRON_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      KAFKA_HOSTS: kafka:9092
      REDIS_URL: redis://redis7:6379/
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      COOKIELESS_REDIS_HOST: redis7
      COOKIELESS_REDIS_PORT: "6379"
      CDP_REDIS_HOST: redis7
      CDP_REDIS_PORT: "6379"
      LOGS_REDIS_HOST: redis7
      LOGS_REDIS_PORT: "6379"
      LOGS_REDIS_TLS: "false"
      SITE_URL: https://<DOMAIN>
      SECRET_KEY: <POSTHOG_SECRET>
      ENCRYPTION_SALT_KEYS: <ENCRYPTION_SALT_KEYS>
      SESSION_RECORDING_V2_S3_TIMEOUT_MS: "120000"
    depends_on: [db, redis7, clickhouse, kafka]

  temporal-django-worker:
    image: ghcr.io/hashing3-technologies/posthog-railway/temporal-django-worker:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      <<: *worker-env
      TEMPORAL_HOST: temporal
      SITE_URL: https://<DOMAIN>
      SECRET_KEY: <POSTHOG_SECRET>
    depends_on: [db, redis7, clickhouse, kafka, temporal]

  # ── Captura / processamento (Rust/Go) ───────────────────────────────────
  capture:
    image: ghcr.io/hashing3-technologies/posthog-railway/capture:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      ADDRESS: 0.0.0.0:3000
      KAFKA_TOPIC: events_plugin_ingestion
      KAFKA_HOSTS: kafka:9092
      REDIS_URL: redis://redis7:6379/
      CAPTURE_MODE: events
      RUST_LOG: info,rdkafka=warn
    depends_on: [kafka, redis7]

  replay-capture:
    image: ghcr.io/hashing3-technologies/posthog-railway/replay-capture:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      ADDRESS: 0.0.0.0:3000
      KAFKA_TOPIC: session_recording_snapshot_item_events
      KAFKA_HOSTS: kafka:9092
      REDIS_URL: redis://redis7:6379/
      CAPTURE_MODE: recordings
    depends_on: [kafka, redis7]

  property-defs-rs:
    image: ghcr.io/hashing3-technologies/posthog-railway/property-defs-rs:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      KAFKA_HOSTS: kafka:9092
      SKIP_WRITES: "false"
      SKIP_READS: "false"
      FILTER_MODE: opt-out
    depends_on: [kafka-init, db]

  cyclotron-janitor:
    image: ghcr.io/hashing3-technologies/posthog-railway/cyclotron-janitor:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      KAFKA_HOSTS: kafka:9092
      KAFKA_TOPIC: clickhouse_app_metrics2
    depends_on: [db, kafka]

  cymbal:
    image: ghcr.io/hashing3-technologies/posthog-railway/cymbal:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      KAFKA_HOSTS: kafka:9092
      KAFKA_CONSUMER_GROUP: cymbal
      KAFKA_CONSUMER_TOPIC: exceptions_ingestion
      DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      PERSONS_URL: postgres://posthog:posthog@db:5432/posthog
      MAXMIND_DB_PATH: /share/GeoLite2-City.mmdb
      REDIS_URL: redis://redis7:6379/
      ISSUE_BUCKETS_REDIS_URL: redis://redis7:6379/
      RUST_LOG: info
      BIND_HOST: 0.0.0.0
      BIND_PORT: "3302"
      OBJECT_STORAGE_BUCKET: <bucket>
      OBJECT_STORAGE_ENDPOINT: https://s3.<region>.backblazeb2.com
      OBJECT_STORAGE_ACCESS_KEY_ID: <b2_application_key_id>
      OBJECT_STORAGE_SECRET_ACCESS_KEY: <b2_application_key>
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
    depends_on: [kafka-init, db, redis7]

  feature-flags:
    image: ghcr.io/hashing3-technologies/posthog-railway/feature-flags:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      WRITE_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      READ_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      PERSONS_WRITE_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      PERSONS_READ_DATABASE_URL: postgres://posthog:posthog@db:5432/posthog
      MAXMIND_DB_PATH: /share/GeoLite2-City.mmdb
      REDIS_URL: redis://redis7:6379/
      ADDRESS: 0.0.0.0:3001
      RUST_LOG: info
      COOKIELESS_REDIS_HOST: redis7
      COOKIELESS_REDIS_PORT: "6379"
    depends_on: [db, redis7]

  livestream:
    image: ghcr.io/hashing3-technologies/posthog-railway/livestream:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      LIVESTREAM_JWT_SECRET: <POSTHOG_SECRET>
    depends_on: [kafka]

  # ── Edge / proxy ────────────────────────────────────────────────────────
  # [VALIDAR] Na Railway o TLS é no edge nativo. Avaliar manter o Caddy (rotea
  # por path) OU expor web/capture/feature-flags/plugins/livestream via domínios
  # nativos da Railway. Se mantido, precisa de CADDYFILE/CADDY_HOST/CADDY_TLS_BLOCK.
  proxy:
    image: ghcr.io/hashing3-technologies/posthog-railway/proxy:9373a2b55081d3e711ad58bca060a6a9ab5d41a5
    environment:
      CADDY_HOST: "<DOMAIN>, http://, https://"
      CADDY_TLS_BLOCK: <TLS_BLOCK>
      # CADDYFILE: <template Caddy completo — ver proxy.Dockerfile / compose oficial>
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [web, livestream]

volumes:
  postgres-data:
  redis7-data:
  clickhouse-data:
  zookeeper-data:
  zookeeper-datalog:
  zookeeper-logs:
  kafka-data:
  caddy-data:
  caddy-config:
